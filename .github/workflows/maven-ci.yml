name: Java CI with Maven

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Code auschecken (korrekt: actions/checkout@v4)
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Java einrichten (korrekt: actions/setup-java@v4)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # 3. Tests ausführen
    - name: Run Tests with Maven
      run: mvn clean test
