name: Java CI with Maven

# Bestimmt, wann der Test läuft (hier: bei jedem Push oder PR auf den main-Branch)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Holt den Code aus dem Repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Richtet das JDK ein (hier Java 17, passe es an deine Version an)
    - name: Set up JDK 17
      uses: actions/actions-setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Führt die Maven-Tests aus (sucht nach @Test Annotationen z.B. von JUnit)
    - name: Run Tests with Maven
      run: mvn clean test
